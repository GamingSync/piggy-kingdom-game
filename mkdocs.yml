site_name: Piggy Kingdom
site_description: 
site_url: https://piggy-kingdom-game.readthedocs.io

docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  language: en
  palette:
    - scheme: default
      primary: green
      accent: light-green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: light-green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

extra_javascript:
  - js/tracker.js

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Features: features.md
  - How to Download: how-to-download.md
  - FAQ: faq.md
  - Piggy Kingdom Android: piggy-kingdom-android.md
  - Piggy Kingdom Ios: piggy-kingdom-ios.md
